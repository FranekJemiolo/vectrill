repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        description: Format Rust code
        entry: cargo fmt
        language: system
        args: [--check]
        files: \.rs$
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check Rust code
        entry: cargo check
        language: system
        args: [--all-targets, --all-features]
        files: \.rs$
        pass_filenames: false
