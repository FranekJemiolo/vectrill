name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-rust:
    name: Test Rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: "performance connectors-full"
          - os: macos-latest
            rust: stable
            features: "performance connectors-full"
          - os: windows-latest
            rust: stable
            features: "connectors-basic"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cargo test --lib --features="${{ matrix.features }}" --verbose
            cargo test --test sequencer_performance --features="${{ matrix.features }}" --verbose
            cargo test --test sequencer_functional --features="${{ matrix.features }}" --verbose
            cargo test --test cross_reference --features="${{ matrix.features }}" --verbose
            cargo test --test e2e_test --features="${{ matrix.features }}" --verbose
            cargo test --test e2e_connectors --features="${{ matrix.features }}" --verbose
            cargo test --test sequencer_optimization_benchmark --features="${{ matrix.features }}" --verbose
          else
            cargo test --lib --test '*' --features="${{ matrix.features }}" --verbose
          fi
        shell: bash

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Python dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          # Install all dependencies including all optional dependencies
          uv sync --all-extras
          # Verify pytest is available
          uv run python -c "import pytest; print('pytest available')"

      - name: Build and install Python package
        run: |
          source .venv/bin/activate
          # Build the Rust library first
          cargo build --release --features python
          
          # Install maturin and build the Python package
          pip install maturin
          maturin develop --release --features python
          
          # Verify the installation
          echo "Checking if vectrill can be imported:"
          python -c "import vectrill; print('Vectrill imported successfully')"
          echo "Installed package contents:"
          find .venv/lib/python3.12/site-packages/vectrill* -name "*.so" -o -name "_rust" -type d | head -10 || echo "No vectrill package found in site-packages"

      - name: Run Python tests
        run: |
          source .venv/bin/activate
          # Set PYTHONPATH to include the source directory
          export PYTHONPATH=/home/runner/work/vectrill/vectrill/python:$PYTHONPATH
          
          # Verify vectrill can be imported
          python -c "import vectrill; print('Vectrill imported successfully in test environment')"
          
          # Run tests from the project directory
          cd /home/runner/work/vectrill/vectrill
          python -m pytest tests/python/ -v --tb=short
