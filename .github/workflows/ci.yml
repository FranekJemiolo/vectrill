name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-rust:
    name: Test Rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: "performance connectors-full"
          - os: macos-latest
            rust: stable
            features: "performance connectors-full"
          - os: windows-latest
            rust: stable
            features: "performance connectors-basic"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --lib --test '*' --features="${{ matrix.features }}" --verbose

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Python dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          # Install all dependencies including all optional dependencies
          uv sync --all-extras
          # Verify pytest is available
          uv run python -c "import pytest; print('pytest available')"

      - name: Build and install Python package
        run: |
          source .venv/bin/activate
          # Use the same approach that worked locally
          unset CONDA_PREFIX
          uv run maturin develop --release --features python
          # Verify the installation
          echo "Installed package contents:"
          find .venv/lib/python3.12/site-packages/vectrill* -name "*.so" -o -name "_rust" -type d | head -10

      - name: Run Python tests
        run: |
          # Use uv run to ensure proper environment with all dependencies
          # Move to temporary directory to avoid local import conflicts
          cd /tmp
          cp -r /home/runner/work/vectrill/vectrill/tests ./tests
          /home/runner/work/vectrill/vectrill/.venv/bin/python -m pytest tests/python/ -v
