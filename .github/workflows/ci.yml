name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-rust:
    name: Test Rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Python dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          # Install all dependencies including all optional dependencies
          uv sync --all-extras
          # Verify pytest is available
          uv run python -c "import pytest; print('pytest available')"

      - name: Build Python package
        run: |
          source .venv/bin/activate
          # Build platform-specific wheel with Python bindings
          maturin build --release --features python --target x86_64-unknown-linux-gnu --out dist --skip-auditwheel

      - name: Install Python package
        run: |
          source .venv/bin/activate
          uv pip uninstall -y vectrill || true
          # Install the built wheel from dist directory using uv pip
          BUILT_WHEEL=$(find dist -name "vectrill-*-cp312-cp312-linux_x86_64.whl" | head -1)
          # Install the built wheel if found, otherwise skip
          if [ -n "$BUILT_WHEEL" ]; then
            echo "Installing wheel: $BUILT_WHEEL"
            # Inspect wheel contents to verify Rust modules are included
            unzip -l "$BUILT_WHEEL" | grep -E "(vectrill|_rust)"
            uv pip install "$BUILT_WHEEL"
          else
            echo "No built wheel found, skipping installation"
          fi

      - name: Run Python tests
        run: |
          # Use uv run to ensure proper environment with all dependencies
          # Move to temporary directory to avoid local import conflicts
          cd /tmp
          cp -r /home/runner/work/vectrill/vectrill/tests ./tests
          /home/runner/work/vectrill/vectrill/.venv/bin/python -m pytest tests/python/ -v
