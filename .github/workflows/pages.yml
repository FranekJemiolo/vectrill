name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # This job runs regardless of Pages configuration
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (attempt auto-enable)
        id: pages-setup
        uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true

      - name: Build with Jekyll
        if: steps.pages-setup.outcome == 'success' || steps.pages-setup.outcome == 'skipped'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        if: steps.pages-setup.outcome == 'success' || steps.pages-setup.outcome == 'skipped'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Pages Setup Instructions
        if: steps.pages-setup.outcome == 'failure'
        run: |
          echo "::warning ::GitHub Pages requires manual setup for this repository"
          echo "::warning ::Please follow these steps:"
          echo "::warning ::1. Go to: https://github.com/FranekJemiolo/vectrill/settings/pages"
          echo "::warning ::2. Under 'Build and deployment', set Source to 'Deploy from a branch'"
          echo "::warning ::3. Select 'main' branch and '/ (root)' folder"
          echo "::warning ::4. Click Save"
          echo "::warning ::5. Push any change or re-run this workflow to deploy"

  # This job only runs if Pages is properly configured
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
