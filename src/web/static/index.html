<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectrill Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #1e293b;
            padding: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            color: #38bdf8;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            background: #22c55e;
            color: white;
            font-size: 12px;
            margin-left: 10px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        .card h2 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
        }
        .metric-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
        }
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .jobs-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        .jobs-section h2 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .job-list {
            list-style: none;
        }
        .job-item {
            padding: 12px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: background 0.2s;
        }
        .job-item:hover {
            background: #334155;
        }
        .job-item:last-child {
            border-bottom: none;
        }
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .job-id {
            font-family: monospace;
            color: #38bdf8;
            font-size: 12px;
        }
        .job-status {
            padding: 2px 8px;
            border-radius: 4px;
            background: #22c55e;
            color: white;
            font-size: 11px;
            text-transform: uppercase;
        }
        .job-status.running {
            background: #3b82f6;
        }
        .job-status.failed {
            background: #ef4444;
        }
        .job-meta {
            font-size: 12px;
            color: #64748b;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .refresh-btn:hover {
            background: #2563eb;
        }
        .query-plan-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        .query-plan-section h2 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .plan-tree {
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.8;
        }
        .plan-node {
            margin-left: 20px;
        }
        .plan-node::before {
            content: "├─ ";
            color: #38bdf8;
        }
        .plan-node:last-child::before {
            content: "└─ ";
        }
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>Vectrill Dashboard <span class="status">v0.1.0</span></h1>
                <button class="refresh-btn" onclick="refreshData()">Refresh</button>
            </div>
        </div>
    </header>
    <div class="container">
        <div class="metrics-grid">
            <div class="card">
                <h2>Total Jobs</h2>
                <div class="metric-value" id="total-jobs">0</div>
                <div class="metric-label">Jobs processed</div>
            </div>
            <div class="card">
                <h2>Active Jobs</h2>
                <div class="metric-value" id="active-jobs">0</div>
                <div class="metric-label">Currently running</div>
            </div>
            <div class="card">
                <h2>Batches Processed</h2>
                <div class="metric-value" id="batches-processed">0</div>
                <div class="metric-label">Total batches</div>
            </div>
            <div class="card">
                <h2>Rows Processed</h2>
                <div class="metric-value" id="rows-processed">0</div>
                <div class="metric-label">Total rows</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="jobs-section">
                <h2>Recent Jobs</h2>
                <ul class="job-list" id="job-list">
                    <li class="empty-state">No jobs yet</li>
                </ul>
            </div>
            
            <div class="query-plan-section">
                <h2>Query Plan</h2>
                <div class="plan-tree" id="query-plan">
                    <div style="color: #64748b; text-align: center; padding: 40px;">
                        Select a job to view its query plan
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedJobId = null;

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                return data.metrics;
            } catch (error) {
                console.error('Failed to fetch metrics:', error);
                return [];
            }
        }

        async function fetchJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to fetch jobs:', error);
                return [];
            }
        }

        async function fetchJobDetail(jobId) {
            try {
                const response = await fetch(`/api/jobs/${jobId}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to fetch job detail:', error);
                return null;
            }
        }

        function renderQueryPlan(plan) {
            if (!plan) {
                return '<div style="color: #64748b; text-align: center; padding: 40px;">No query plan available</div>';
            }
            
            function renderNode(node, depth = 0) {
                const indent = '  '.repeat(depth);
                const children = node.children ? node.children.map(c => renderNode(c, depth + 1)).join('') : '';
                return `${indent}<div class="plan-node">${node.operator}</div>\n${children}`;
            }
            
            return renderNode(plan);
        }

        async function selectJob(jobId) {
            selectedJobId = jobId;
            const jobDetail = await fetchJobDetail(jobId);
            
            if (jobDetail && jobDetail.query_plan) {
                document.getElementById('query-plan').innerHTML = renderQueryPlan(jobDetail.query_plan);
            } else {
                document.getElementById('query-plan').innerHTML = 
                    '<div style="color: #64748b; text-align: center; padding: 40px;">No query plan available for this job</div>';
            }
            
            // Update selected state
            document.querySelectorAll('.job-item').forEach(item => {
                item.style.background = '';
            });
            event.currentTarget.style.background = '#334155';
        }

        async function refreshData() {
            const metrics = await fetchMetrics();
            const jobs = await fetchJobs();
            
            // Update metrics display
            const totalJobs = metrics.find(m => m.name === 'jobs_total');
            const activeJobs = metrics.find(m => m.name === 'jobs_active');
            const batchesProcessed = metrics.find(m => m.name === 'batches_processed');
            const rowsProcessed = metrics.find(m => m.name === 'rows_processed');
            
            document.getElementById('total-jobs').textContent = 
                totalJobs ? (totalJobs.value.Counter || 0) : 0;
            document.getElementById('active-jobs').textContent = 
                activeJobs ? (activeJobs.value.Counter || 0) : 0;
            document.getElementById('batches-processed').textContent = 
                batchesProcessed ? (batchesProcessed.value.Counter || 0) : 0;
            document.getElementById('rows-processed').textContent = 
                rowsProcessed ? (rowsProcessed.value.Counter || 0) : 0;
            
            // Update jobs list
            const jobList = document.getElementById('job-list');
            if (jobs.length === 0) {
                jobList.innerHTML = '<li class="empty-state">No jobs yet</li>';
            } else {
                jobList.innerHTML = jobs.map(job => `
                    <li class="job-item" onclick="selectJob('${job.id}')">
                        <div class="job-header">
                            <span class="job-id">${job.id.substring(0, 8)}...</span>
                            <span class="job-status ${job.status.toLowerCase()}">${job.status}</span>
                        </div>
                        <div class="job-meta">Created: ${new Date(job.created_at).toLocaleString()}</div>
                    </li>
                `).join('');
            }
        }

        // Auto-refresh every 5 seconds
        refreshData();
        setInterval(refreshData, 5000);
    </script>
</body>
</html>
