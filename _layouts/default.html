<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}{% if page.title %} - {{ page.title }}{% endif %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f6f8fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #24292e;
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 600;
        }
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.8;
            font-size: 1.1em;
        }
        .navigation {
            background-color: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .navigation ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .navigation a {
            color: #0366d6;
            text-decoration: none;
            font-weight: 500;
        }
        .navigation a:hover {
            text-decoration: underline;
        }
        .content {
            background-color: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .markdown-body {
            font-size: 16px;
            line-height: 1.6;
        }
        .markdown-body h1 {
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-bottom: 16px;
        }
        .markdown-body h2 {
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-bottom: 16px;
        }
        .footer {
            text-align: center;
            color: #586069;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #e1e4e8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </div>
    </div>
    
    <div class="container">
        <nav class="navigation">
            <ul>
                {% for item in site.navigation %}
                <li><a href="{{ item.url }}">{{ item.title }}</a></li>
                {% endfor %}
            </ul>
        </nav>
        
        <main class="content">
            <div class="markdown-body">
                {{ content }}
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Documentation built with Jekyll.</p>
        </footer>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</body>
</html>
